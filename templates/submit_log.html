<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>إضافة Log يدوي</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            direction: rtl;
            font-family: 'Cairo', sans-serif;

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 2rem;

            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 25%),
                radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.15), transparent 25%),
                linear-gradient(135deg, #020617, #0f172a);

            color: #f8fafc;
        }

        .card {
            width: 100%;
            max-width: 760px;

            background: rgba(15, 23, 42, 0.85);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border-radius: 34px;

            padding: 2rem;

            border: 1px solid rgba(255, 255, 255, 0.08);

            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 2rem;
            font-weight: 800;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;

            background: linear-gradient(90deg, #60a5fa, #3b82f6, #2563eb);

            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .header p {
            color: #94a3b8;
            margin-top: 0.7rem;
            font-size: 0.95rem;
        }

        .success {
            background: rgba(34, 197, 94, 0.12);

            border: 1px solid rgba(74, 222, 128, 0.2);

            color: #4ade80;

            padding: 1rem 1.2rem;

            border-radius: 18px;

            margin-bottom: 1.5rem;

            text-align: center;

            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.5rem;

            color: #cbd5e1;

            font-size: 0.9rem;
            font-weight: 600;
        }

        input,
        select,
        textarea {
            width: 100%;

            background: rgba(2, 6, 23, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.08);

            padding: 0.95rem 1rem;

            border-radius: 18px;

            color: white;

            font-family: inherit;

            outline: none;

            transition: 0.25s ease;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #3b82f6;

            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        input::placeholder,
        textarea::placeholder {
            color: #64748b;
        }

        .submit-btn {
            width: 100%;

            margin-top: 1.5rem;

            border: none;

            background: linear-gradient(135deg, #2563eb, #1d4ed8);

            color: white;

            padding: 1rem;

            border-radius: 18px;

            font-size: 1rem;
            font-weight: 700;

            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;

            transition: 0.3s ease;

            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
        }

        .submit-btn:hover {
            transform: translateY(-3px);

            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.45);
        }

        .back-link {
            margin-top: 1.5rem;

            text-align: center;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;

            color: #93c5fd;

            text-decoration: none;

            font-weight: 700;

            transition: 0.25s ease;
        }

        .back-link a:hover {
            color: white;
            transform: translateX(-3px);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 20px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        @media (max-width: 768px) {

            body {
                padding: 1rem;
            }

            .card {
                padding: 1.4rem;
            }

            .header h2 {
                font-size: 1.5rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="header">

            <h2>

                <i class="fas fa-pen-alt"></i>
                إضافة Log يدوي

            </h2>

            <p>
                قم بإضافة سجل جديد وتحليل النشاط الأمني داخل النظام
            </p>

        </div>

        {% if success %}

        <div class="success">

            ✅ تم إضافة Log من IP {{ log.src_ip }}

        </div>

        {% endif %}

        <form method="POST">

            <div class="form-grid">

                <div class="input-group">

                    <label>
                        IP المصدر *
                    </label>

                    <input
                        name="src_ip"
                        required
                        placeholder="مثال: 192.168.1.1">

                </div>

                <div class="input-group">

                    <label>
                        اسم المستخدم
                    </label>

                    <input
                        name="username"
                        placeholder="اسم المستخدم">

                </div>

                <div class="input-group">

                    <label>
                        نوع الحدث
                    </label>

                    <input
                        name="event_type"
                        value="login">

                </div>

                <div class="input-group">

                    <label>
                        الحالة
                    </label>

                    <select name="status">

                        <option>
                            success
                        </option>

                        <option>
                            failed
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>
                        المسار (مثال /login)
                    </label>

                    <input
                        name="request_path"
                        placeholder="/login">

                </div>

                <div class="input-group">

                    <label>
                        الطريقة (GET/POST)
                    </label>

                    <input
                        name="method"
                        placeholder="POST">

                </div>

                <div class="input-group full-width">

                    <label>
                        التفاصيل
                    </label>

                    <textarea
                        name="details"
                        placeholder="اكتب تفاصيل الـ Log هنا..."></textarea>

                </div>

            </div>

            <button
                type="submit"
                class="submit-btn">

                <i class="fas fa-save"></i>
                إرسال الـ Log

            </button>

        </form>

        <div class="back-link">

            <a href="/">

                <i class="fas fa-arrow-right"></i>
                العودة للوحة التحكم

            </a>

        </div>

    </div>

</body>

</html>
